# /etc/nginx/sites-available/cms.conf
server {
    listen 80 default_server;
    server_name _;
    root /var/www/cms;
    index index.php index.html;

    # IPTV Content Management System (Apache PHP on :8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets served directly
    location /assets/ {
        root /var/www/cms;
        expires 30d;
    }

    # Uploaded files served directly
    location /uploads/ {
        root /var/www/cms;
    }

    # Backup directory with autoindex enabled
    location /backup/ {
        root /var/www/cms;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Media API — IPTV content orchestration (Flask on :5000)
    location /media {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
